<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SymBot — SIT Nagpur</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0f1a;
--surface:#111827;
--card:#1a2235;
--border:#2a3a55;
--gold:#f0b429;
--teal:#3ec9c4;
--text:#e8edf5;
--muted:#7b8fa8;
--user:#1e3a5f;
--bot:#162030;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
width:100%;
background:#091e3a;
padding:16px 24px;
display:flex;
align-items:center;
gap:12px;
border-bottom:1px solid var(--border);
}

.logo{
width:48px;
height:48px;
border-radius:50%;
background:linear-gradient(135deg,var(--gold),#d09000);
display:flex;
align-items:center;
justify-content:center;
font-family:'Rajdhani';
font-weight:700;
color:black;
}

.header-text h1{
font-family:'Rajdhani';
font-weight:700;
background:linear-gradient(90deg,var(--gold),var(--teal));
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header-text p{
font-size:12px;
color:var(--muted);
}

.steps{
width:90%;
max-width:820px;
display:flex;
flex-wrap:wrap;
gap:8px;
padding:12px 0;
}

.step{
padding:6px 14px;
border-radius:20px;
border:1px solid var(--border);
background:var(--card);
cursor:pointer;
font-size:12px;
color:var(--muted);
}

.step.active{
background:var(--gold);
color:black;
font-weight:600;
}

.chat{
width:90%;
max-width:820px;
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:18px;
height:420px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
display:flex;
gap:8px;
}

.msg.user{
flex-direction:row-reverse;
}

.bubble{
padding:10px 14px;
border-radius:10px;
max-width:70%;
font-size:14px;
}

.user .bubble{
background:var(--user);
}

.bot .bubble{
background:var(--bot);
}

.input-area{
width:90%;
max-width:820px;
display:flex;
gap:10px;
padding:14px 0;
}

textarea{
flex:1;
background:var(--card);
border:1px solid var(--border);
border-radius:8px;
color:var(--text);
padding:10px;
resize:none;
}

button{
width:46px;
border:none;
border-radius:8px;
background:var(--gold);
cursor:pointer;
font-size:18px;
}

.typing{
font-size:13px;
color:var(--muted);
}

</style>
</head>

<body>

<header>
<div class="logo">SIT</div>
<div class="header-text">
<h1>SymBot</h1>
<p>SIT Nagpur AI FAQ Assistant</p>
</div>
</header>

<div class="steps" id="steps">
<div class="step active" onclick="setStep(0)">All</div>
<div class="step" onclick="setStep(1)">Step 1</div>
<div class="step" onclick="setStep(2)">Step 2</div>
<div class="step" onclick="setStep(3)">Step 3</div>
<div class="step" onclick="setStep(4)">Step 4</div>
<div class="step" onclick="setStep(5)">Step 5</div>
<div class="step" onclick="setStep(6)">Step 6</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<textarea id="input" rows="1" placeholder="Ask about SIT Nagpur..." onkeydown="enterSend(event)"></textarea>
<button onclick="send()">➤</button>
</div>

<script>

let currentStep=0

function setStep(step){
currentStep=step

let chips=document.querySelectorAll(".step")

chips.forEach((c,i)=>{
c.classList.remove("active")
if(i===step){c.classList.add("active")}
})

}

// Expanded FAQ database
const FAQ = {
fees:"B.Tech Fees at SIT Nagpur are around ₹1.8L–₹2.2L per year depending on branch.",
hostel:"Hostel facilities are available for boys and girls with WiFi, mess, and 24×7 security.",
admission:"Admissions are done through JEE Main or MHT-CET counselling.",
placement:"Average placement package is around ₹5.5 LPA and companies like TCS, Infosys visit campus.",
wifi:"Campus provides high-speed WiFi connectivity for students and faculty.",
library:"The library has 20,000+ books and digital resources including journals.",
canteen:"The campus canteen provides breakfast, lunch, snacks and dinner options.",
courses:"Courses include B.Tech in CSE, IT, Mechanical, Civil, E&TC, and AI & ML.",
scholarship:"Merit and government scholarships are available for eligible students.",
exam:"Mid-sem and end-sem exams are conducted every semester.",
contact:"You can contact the admissions office through the official website or email.",
timetable:"Timetables are available on the ERP portal of the institute.",
sports:"Sports facilities include cricket ground, football field, gym and indoor games.",
transport:"Bus transportation is available from different parts of Nagpur.",
internship:"Students get internship opportunities through the placement cell.",
faculty:"The institute has experienced professors and industry experts as faculty."
};


// Improved bot reply function
function botReply(query){

query=query.toLowerCase()

if(query.includes("fee") || query.includes("cost") || query.includes("tuition"))
return FAQ.fees

if(query.includes("hostel") || query.includes("room") || query.includes("stay"))
return FAQ.hostel

if(query.includes("admission") || query.includes("apply") || query.includes("eligibility"))
return FAQ.admission

if(query.includes("placement") || query.includes("job") || query.includes("company"))
return FAQ.placement

if(query.includes("wifi") || query.includes("internet"))
return FAQ.wifi

if(query.includes("library") || query.includes("books"))
return FAQ.library

if(query.includes("canteen") || query.includes("food"))
return FAQ.canteen

if(query.includes("course") || query.includes("branch") || query.includes("program"))
return FAQ.courses

if(query.includes("scholarship") || query.includes("financial aid"))
return FAQ.scholarship

if(query.includes("exam") || query.includes("result"))
return FAQ.exam

if(query.includes("contact") || query.includes("phone") || query.includes("email"))
return FAQ.contact

if(query.includes("timetable") || query.includes("schedule"))
return FAQ.timetable

if(query.includes("sports") || query.includes("games"))
return FAQ.sports

if(query.includes("transport") || query.includes("bus"))
return FAQ.transport

if(query.includes("internship") || query.includes("training"))
return FAQ.internship

if(query.includes("faculty") || query.includes("teacher") || query.includes("professor"))
return FAQ.faculty

return "Sorry, I couldn't find that information. Please ask about fees, hostel, admission, placement, courses, exams, or campus facilities."
}

function addMessage(text,type){

let chat=document.getElementById("chat")

let msg=document.createElement("div")
msg.className="msg "+type

let bubble=document.createElement("div")
bubble.className="bubble"
bubble.innerText=text

msg.appendChild(bubble)
chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

function botReply(query){

query=query.toLowerCase()

if(query.includes("fee")) return FAQ.fees
if(query.includes("hostel")) return FAQ.hostel
if(query.includes("admission")) return FAQ.admission
if(query.includes("placement")) return FAQ.placement
if(query.includes("wifi")) return FAQ.wifi
if(query.includes("library")) return FAQ.library

return "Sorry, I couldn't find that information."

}

function send(){

let input=document.getElementById("input")
let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let typing=document.createElement("div")
typing.className="typing"
typing.innerText="SymBot is typing..."
document.getElementById("chat").appendChild(typing)

setTimeout(()=>{

typing.remove()

let reply=botReply(text)

addMessage(reply,"bot")

},800)

}

function enterSend(e){
if(e.key==="Enter"){
e.preventDefault()
send()
}
}

</script>

</body>
</html>
